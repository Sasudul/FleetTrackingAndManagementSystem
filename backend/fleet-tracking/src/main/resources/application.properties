# SERVER CONFIGURATION
server.port=${PORT:8080}
server.servlet.context-path=/api/v1

# DATASOURCE CONFIGURATION (PostgreSQL)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fleet_db}?stringtype=unspecified
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=Cool2006#
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=2000000

# JPA / HIBERNATE SETTINGS
# In production, use 'validate' or 'none'. Use 'update' only for dev.
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# SECURITY (JWT)
# Override via environment variable JWT_SECRET in production
jwt.secret=${JWT_SECRET:9a4f2c8d3b7a1e6f45j2k8l9p0o1i2u3y4t5r6e7w8q9a0s}
jwt.expiration=86400000