# SERVER CONFIGURATION
server.port=${PORT:8080}
server.servlet.context-path=/api/v1

# DATASOURCE CONFIGURATION (PostgreSQL)
# Values are pulled from System Environment Variables (best for Docker)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fleet_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:secret}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=2000000

# JPA / HIBERNATE SETTINGS
# In production, use 'validate' or 'none'. Use 'update' only for dev.
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# FIREBASE CONFIGURATION (For Backend Admin SDK)
firebase.config.path=${FIREBASE_CONFIG_PATH:classpath:firebase-service-account.json}
firebase.database.url=${FIREBASE_DB_URL}

# SECURITY (JWT)
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000